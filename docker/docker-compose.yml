services:
  running-coach:
    build:
      context: ..
      dockerfile: docker/Dockerfile.skills
    env_file:
      - ../.env
    volumes:
      - ../data:/skill/data
    working_dir: /skill

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.skills
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../data:/skill/data
      - chroma-model-cache:/home/pacr/.cache/chroma
    working_dir: /skill/src
    command: ["uv", "run", "tgbot/bot.py", "bot"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('https://api.telegram.org')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  chroma-model-cache:
