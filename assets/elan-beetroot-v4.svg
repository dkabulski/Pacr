<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="280" rx="14" fill="#0d0d0d"/>

  <!-- Filled beetroot using block characters -->
  <!-- Leaves - green filled -->
  <text class="mono" x="44" y="66"  font-size="20" fill="#40a870"> ▌│▐ ▌│▐</text>
  <text class="mono" x="44" y="88"  font-size="20" fill="#40a870">  ▐▌▌▌▌▌</text>
  <text class="mono" x="44" y="110" font-size="20" fill="#3a9060">   ████  </text>
  <!-- Shoulder -->
  <text class="mono" x="44" y="132" font-size="20" fill="#c0407a"> ████████ </text>
  <!-- Wide body -->
  <text class="mono" x="44" y="154" font-size="20" fill="#c0407a">██████████</text>
  <text class="mono" x="44" y="176" font-size="20" fill="#b83878">██████████</text>
  <text class="mono" x="44" y="198" font-size="20" fill="#b03070"> ████████ </text>
  <!-- Taper -->
  <text class="mono" x="44" y="220" font-size="20" fill="#982860">  ██████  </text>
  <text class="mono" x="44" y="242" font-size="20" fill="#801f50">   ████   </text>
  <!-- Taproot -->
  <text class="mono" x="44" y="264" font-size="20" fill="#601840">    ██    </text>

  <!-- Divider -->
  <line x1="248" y1="44" x2="248" y2="262" stroke="#222" stroke-width="1.5"/>

  <!-- Name -->
  <text class="mono" x="278" y="155" font-size="68" font-weight="700" letter-spacing="2">
    <tspan fill="#c0407a">É</tspan><tspan fill="#f5f5f5">lan</tspan>
  </text>

  <!-- Tagline -->
  <text class="mono" x="281" y="183" font-size="16" fill="#777" letter-spacing="1">// AI running coach</text>

  <!-- Divider line -->
  <line x1="278" y1="200" x2="650" y2="200" stroke="#222" stroke-width="1.5"/>

  <!-- Meta -->
  <text class="mono" x="278" y="223" font-size="14" fill="#52b788">✓</text>
  <text class="mono" x="299" y="223" font-size="14" fill="#aaa">Claude · Strava · Jack Daniels method</text>

  <text class="mono" x="278" y="246" font-size="14" fill="#c0407a">$</text>
  <text class="mono" x="298" y="246" font-size="14" fill="#ccc">elan today</text>

  <text class="mono" x="298" y="267" font-size="14" fill="#555">→</text>
  <text class="mono" x="316" y="267" font-size="14" fill="#999">Easy 8km @ Z2 · 5:30–5:50/km</text>
</svg>
